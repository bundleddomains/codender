<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Safe-ish Renderer</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    display: flex;
    flex-direction: column;
  }

  #controls {
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: #1a1a1a;
    box-sizing: border-box;
  }

  button {
    background: #222;
    color: #fff;
    border: 1px solid #333;
    padding: 8px 12px;
    cursor: pointer;
  }
  button:hover { background: #2c2c2c; }

  #status {
    color: #aaa;
    font-size: 12px;
    margin-left: auto;
    user-select: none;
  }

  #preview {
    flex: 1;
    width: 100%;
    border: 1px solid #333;
    background: #ececec;
    display: block;
  }

  textarea { position: absolute; left: -9999px; }
</style>
</head>
<body>

<div id="controls">
  <button id="pasteBtn">Paste</button>
  <button id="runBtn">Run</button>
  <button id="clearBtn">Clear</button>
  <div id="status">Empty</div>
</div>

<iframe id="preview" sandbox="allow-scripts" scrolling="yes"></iframe>
<textarea id="code"></textarea>

<script>
const codeEl = document.getElementById("code");
const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");

function setStatus(msg) { statusEl.textContent = msg; }

// Hardened preview shell:
// - grey page background (non-blinding)
// - transparent html/body so negative z-index doesn't vanish behind body paint
// - #__root creates a stacking context with isolation so z-index:-1 stays "inside"
function previewShell(innerHtml) {
  return `<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* page surface */
  :root { color-scheme: light; }
  body { background: #ececec; }

  /* prevent body paint from "eating" negative z-index layers in weird cases */
  html, body {
    margin: 0 !important;
    min-height: 100vh !important;
    overflow: auto !important;
    background: transparent !important;
  }

  /* stable stacking context container */
  #__root {
    position: relative;
    min-height: 100vh;
    background: #ececec;
    isolation: isolate;     /* key for negative z-index reliability */
  }
</style>
</head>
<body>
  <div id="__root">${innerHtml}</div>
</body>
</html>`;
}

function wrapUserCode(userCode) {
  const raw = String(userCode || "");

  // If they pasted a full document, we *still* try to inject a root isolation layer.
  // We do that by adding `isolation:isolate` to body and forcing background logic.
  const injection = `
<style>
  body { isolation: isolate !important; }
  html, body { background: transparent !important; }
</style>`.trim();

  const hasHtml = /<html[\s>]/i.test(raw);
  const hasHead = /<head[\s>]/i.test(raw);
  const hasBody = /<body[\s>]/i.test(raw);

  if (hasHtml) {
    let out = raw;
    if (hasHead) out = out.replace(/<head([\s>])/i, `<head$1${injection}\n`);
    else out = out.replace(/<html([\s>])/i, `<html$1\n<head>${injection}</head>\n`);

    // If they have a body, wrap body contents in a root div with isolation.
    if (hasBody) {
      out = out.replace(/<body([^>]*)>/i, `<body$1><div id="__root" style="min-height:100vh;background:#ececec;isolation:isolate;position:relative;">`);
      out = out.replace(/<\/body>/i, `</div></body>`);
    }
    return out;
  }

  // Fragment mode (most common): safest path
  return previewShell(raw);
}

function runCode() {
  const raw = codeEl.value;
  preview.srcdoc = wrapUserCode(raw);
  statusEl.textContent = raw.trim() ? `Rendered (${raw.length} chars)` : "Empty";
}

async function pasteCode() {
  try {
    const text = await navigator.clipboard.readText();
    codeEl.value = text;
    statusEl.textContent = `Pasted (${text.length} chars)`;
    runCode();
  } catch {
    statusEl.textContent = "Paste blocked";
    alert("Clipboard access denied by browser.");
  }
}

function clearCode() {
  codeEl.value = "";
  preview.srcdoc = wrapUserCode("");
  statusEl.textContent = "Cleared";
}

document.getElementById("pasteBtn").addEventListener("click", pasteCode);
document.getElementById("runBtn").addEventListener("click", runCode);
document.getElementById("clearBtn").addEventListener("click", clearCode);

preview.srcdoc = wrapUserCode("");
</script>

</body>
</html>
