<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Minimal Render</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    display: flex;
    flex-direction: column;
  }

  #controls {
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: #1a1a1a;
    box-sizing: border-box;
  }

  button {
    background: #222;
    color: #fff;
    border: 1px solid #333;
    padding: 8px 12px;
    cursor: pointer;
  }
  button:hover { background: #2c2c2c; }

  #status {
    color: #aaa;
    font-size: 12px;
    margin-left: auto;
    user-select: none;
  }

  /* Fill remaining space */
  #preview {
    flex: 1;
    width: 100%;
    border: 1px solid #333;
    background: #ececec;
    display: block;
  }

  textarea { position: absolute; left: -9999px; }
</style>
</head>
<body>

<div id="controls">
  <button id="pasteBtn">Paste</button>
  <button id="runBtn">Run</button>
  <button id="popBtn">Popout</button>
  <button id="clearBtn">Clear</button>
  <div id="status">Empty</div>
</div>

<iframe id="preview" sandbox="allow-scripts" scrolling="yes"></iframe>
<textarea id="code"></textarea>

<script>
const codeEl = document.getElementById("code");
const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");

function setStatus(msg) { statusEl.textContent = msg; }

function wrapForPreview(userCode) {
  const raw = String(userCode || "");

  // Force non-blinding grey + allow scrolling by default (prevents "only a piece")
  const injected = `
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body {
    margin: 0 !important;
    background: #ececec !important;
    overflow: auto !important;  /* <-- key */
  }
</style>`.trim();

  const hasHtml = /<html[\s>]/i.test(raw);
  const hasHead = /<head[\s>]/i.test(raw);

  if (hasHtml) {
    if (hasHead) return raw.replace(/<head([\s>])/i, `<head$1${injected}\n`);
    return raw.replace(/<html([\s>])/i, `<html$1\n<head>${injected}</head>\n`);
  }

  // Fragment -> full doc
  return `<!doctype html><html><head><meta charset="utf-8">${injected}</head><body>${raw}</body></html>`;
}

function runCode() {
  const raw = codeEl.value;
  preview.srcdoc = wrapForPreview(raw);
  setStatus(raw.trim() ? `Rendered (${raw.length} chars)` : "Empty");
}

async function pasteCode() {
  try {
    const text = await navigator.clipboard.readText();
    codeEl.value = text;
    setStatus(`Pasted (${text.length} chars)`);
    runCode(); // auto-run
  } catch {
    setStatus("Paste blocked");
    alert("Clipboard access denied by browser.");
  }
}

function clearCode() {
  codeEl.value = "";
  preview.srcdoc = wrapForPreview("");
  setStatus("Cleared");
}

function popout() {
  const html = wrapForPreview(codeEl.value);
  const blob = new Blob([html], { type: "text/html" });
  const url = URL.createObjectURL(blob);
  window.open(url, "_blank", "noopener,noreferrer");
  setStatus("Popped out");
}

document.getElementById("pasteBtn").addEventListener("click", pasteCode);
document.getElementById("runBtn").addEventListener("click", runCode);
document.getElementById("popBtn").addEventListener("click", popout);
document.getElementById("clearBtn").addEventListener("click", clearCode);

preview.srcdoc = wrapForPreview("");
</script>

</body>
</html>
