<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paste & Run Renderer</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    display: flex;
    flex-direction: column;
  }

  #controls {
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: #1a1a1a;
    box-sizing: border-box;
  }

  button {
    background: #222;
    color: #fff;
    border: 1px solid #333;
    padding: 8px 12px;
    cursor: pointer;
  }
  button:hover { background: #2c2c2c; }

  #status {
    color: #aaa;
    font-size: 12px;
    margin-left: auto;
    user-select: none;
  }

  #preview {
    flex: 1;
    width: 100%;
    border: 1px solid #333; /* visible bounds */
    background: #ececec;    /* fallback while loading */
    display: block;
  }

  textarea { position: absolute; left: -9999px; }
</style>
</head>
<body>

<div id="controls">
  <button id="pasteBtn">Paste</button>
  <button id="runBtn">Run</button>
  <button id="clearBtn">Clear</button>
  <div id="status">Empty</div>
</div>

<iframe id="preview" sandbox="allow-scripts" scrolling="yes"></iframe>
<textarea id="code"></textarea>

<script>
const codeEl = document.getElementById("code");
const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");

function setStatus(msg) { statusEl.textContent = msg; }

/**
 * Preview shell (used for fragment pastes).
 * Enforces:
 * - soft grey background
 * - centered content (both axes)
 * - stable stacking context (negative z-index more reliable)
 * - scroll if content is bigger than viewport
 */
function previewShell(innerHtml) {
  return `<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body {
    margin: 0 !important;
    min-height: 100vh !important;
    overflow: auto !important;
    background: #ececec !important;
  }

  /* Center whatever gets pasted */
  #__stage {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    isolation: isolate; /* helps with z-index:-1 staying inside */
    position: relative;
  }

  /* Don’t let a huge single element break the viewport */
  #__stage > * {
    max-width: 100%;
  }
</style>
</head>
<body>
  <div id="__stage">${innerHtml}</div>
</body>
</html>`;
}

/**
 * If user pastes a full HTML doc, we still try to:
 * - set body isolation
 * - make html/body backgrounds transparent so negatives don't disappear behind paint
 * - wrap body contents in a centered stage
 *
 * If they set aggressive body styles, they can still override (normal web behavior).
 */
function wrapUserCode(userCode) {
  const raw = String(userCode || "");

  const injection = `
<style>
  html, body {
    background: transparent !important;
  }
  body {
    margin: 0 !important;
    min-height: 100vh !important;
    overflow: auto !important;
    isolation: isolate !important;
  }
  #__stage {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    isolation: isolate;
    background: #ececec;
  }
  #__stage > * { max-width: 100%; }
</style>`.trim();

  const hasHtml = /<html[\s>]/i.test(raw);
  const hasHead = /<head[\s>]/i.test(raw);
  const hasBody = /<body[\s>]/i.test(raw);

  if (hasHtml) {
    let out = raw;

    // Inject styles into <head> (or create one)
    if (hasHead) out = out.replace(/<head([\s>])/i, `<head$1${injection}\n`);
    else out = out.replace(/<html([\s>])/i, `<html$1\n<head>${injection}</head>\n`);

    // Wrap body content in centered stage (best effort)
    if (hasBody) {
      out = out.replace(/<body([^>]*)>/i, `<body$1><div id="__stage">`);
      out = out.replace(/<\/body>/i, `</div></body>`);
    }

    return out;
  }

  // Fragment mode: safest and most consistent
  return previewShell(raw);
}

function runCode() {
  const raw = codeEl.value;
  preview.srcdoc = wrapUserCode(raw);
  setStatus(raw.trim() ? `Rendered (${raw.length} chars)` : "Empty");
}

async function pasteCode() {
  try {
    const text = await navigator.clipboard.readText();
    codeEl.value = text;
    setStatus(`Pasted (${text.length} chars)`);
    runCode(); // auto-run so you instantly see it
  } catch {
    setStatus("Paste blocked");
    alert("Clipboard access denied by browser.");
  }
}

function clearCode() {
  codeEl.value = "";
  preview.srcdoc = wrapUserCode("");
  setStatus("Cleared");
}

document.getElementById("pasteBtn").addEventListener("click", pasteCode);
document.getElementById("runBtn").addEventListener("click", runCode);
document.getElementById("clearBtn").addEventListener("click", clearCode);

// Start with a centered blank stage
preview.srcdoc = wrapUserCode("");
</script>

</body>
</html>
