<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview</title>
<style>
  html, body {
    margin:0;
    height:100%;
    background:#111;
    display:flex;
    flex-direction:column;
  }

  #bar {
    height:44px;
    display:flex;
    gap:8px;
    align-items:center;
    padding:6px;
    background:#1a1a1a;
    box-sizing:border-box;
  }

  button {
    background:#222;
    color:#fff;
    border:1px solid #333;
    padding:8px 12px;
    cursor:pointer;
  }

  #wrap {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:auto;
  }

  iframe {
    border:1px solid #333;
    background:#ececec;
    width:90%;
    height:90%;
  }

  textarea { position:absolute; left:-9999px; }
</style>
</head>
<body>

<div id="bar">
  <button id="paste">Paste</button>
  <button id="run">Run</button>
  <button id="clear">Clear</button>
  <button id="kill">Kill</button>
</div>

<div id="wrap">
  <!-- ✅ allow-same-origin fixes localStorage/pointer behavior for your drag editor -->
  <iframe id="pv" sandbox="allow-scripts allow-same-origin" scrolling="yes"></iframe>
</div>

<textarea id="code"></textarea>

<script>
const codeEl = document.getElementById("code");

function iframe() { return document.getElementById("pv"); }

// ✅ Tight CSP injected into every preview (blocks external scripts by default)
const CSP = `
<meta http-equiv="Content-Security-Policy"
content="default-src 'none'; img-src https: data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
`;

function run() {
  // Prepend CSP to whatever you paste/run
  iframe().srcdoc = CSP + codeEl.value;
}

async function paste() {
  const text = await navigator.clipboard.readText();
  codeEl.value = text;
  run();
}

function clearAll() {
  codeEl.value = "";
  iframe().srcdoc = "";
}

function kill() {
  const old = iframe();
  const fresh = document.createElement("iframe");
  fresh.id = "pv";

  // ✅ keep same sandbox settings on the new iframe too
  fresh.setAttribute("sandbox","allow-scripts allow-same-origin");
  fresh.setAttribute("scrolling","yes");

  // keep styling consistent
  fresh.style.width="90%";
  fresh.style.height="90%";
  fresh.style.border="1px solid #333";
  fresh.style.background="#ececec";

  old.replaceWith(fresh);
}

document.getElementById("paste").onclick = () => paste().catch(()=>alert("Paste blocked"));
document.getElementById("run").onclick = run;
document.getElementById("clear").onclick = clearAll;
document.getElementById("kill").onclick = kill;
</script>

</body>
</html>
