<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Preview Lab</title>

<style>
:root {
  --lab-bg:#0e1116;
}

html, body {
  margin:0;
  height:100%;
  background:var(--lab-bg);
  display:flex;
  flex-direction:column;
  font-family:system-ui, sans-serif;
}

/* ───────── TOP BAR ───────── */

#bar {
  height:56px;
  display:flex;
  gap:10px;
  align-items:center;
  padding:8px 14px;
  background:#151922;
  border-bottom:1px solid #222;
  box-sizing:border-box;
}

button {
  background:#1f2630;
  color:#fff;
  border:1px solid #2d3642;
  padding:8px 14px;
  cursor:pointer;
}

label {
  color:#aaa;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:6px;
}

input[type=range] { width:120px; }

input[type=text] {
  width:90px;
  background:#1f2630;
  border:1px solid #2d3642;
  color:#fff;
  padding:4px 6px;
}

/* ───────── MAIN AREA ───────── */

#wrap {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.scene {
  width:900px;
  height:650px;
  perspective:1400px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.viewer {
  width:80%;
  height:80%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ───────── DEVICE PANEL ───────── */

.panel {
  width:100%;
  height:100%;
  background:#1c1f26;
  border-radius:16px;
  overflow:hidden;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.6),
    inset 0 0 0 1px rgba(255,255,255,0.04);

  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease;
}

.viewport {
  width:92%;
  height:92%;
  margin:auto;
  background:#000;
  border-radius:12px;
  overflow:hidden;
  display:flex;
}

.viewport iframe {
  width:100%;
  height:100%;
  border:none;
  background:#ffffff;
}

textarea {
  position:absolute;
  left:-9999px;
}
</style>
</head>
<body>

<div id="bar">
  <button id="paste">Paste</button>
  <button id="run">Run</button>
  <button id="clear">Clear</button>
  <button id="kill">Kill</button>

  <label>X
    <input type="range" id="rotX" min="-60" max="60" value="0">
  </label>

  <label>Y
    <input type="range" id="rotY" min="-180" max="180" value="0">
  </label>

  <label>BGC
    <input type="text" id="bgInput" value="#0e1116">
  </label>
</div>

<div id="wrap">
  <div class="scene">
    <div class="viewer">
      <div class="panel" id="panel">
        <div class="viewport">
          <iframe id="pv"
            sandbox="allow-scripts allow-same-origin"
            scrolling="yes">
          </iframe>
        </div>
      </div>
    </div>
  </div>
</div>

<textarea id="code"></textarea>

<script>
const codeEl = document.getElementById("code");
const panel = document.getElementById("panel");
const rotX = document.getElementById("rotX");
const rotY = document.getElementById("rotY");
const bgInput = document.getElementById("bgInput");

function iframe() { return document.getElementById("pv"); }

/* Tight CSP */
const CSP = `
<meta http-equiv="Content-Security-Policy"
content="default-src 'none'; img-src https: data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
`;

function run() {

  const wrapped = `
  ${CSP}
  <style>
    html, body {
      margin:0;
      height:100%;
    }

    #__rotor__ {
      width:100%;
      height:100%;
      transform-style: preserve-3d;
      transform-origin:center center;
      transition: transform 0.1s ease;
    }
  </style>

  <div id="__rotor__">
    ${codeEl.value}
  </div>

  <script>
    window.addEventListener("message", (e) => {
      if (e.data?.type === "rotate") {
        const el = document.getElementById("__rotor__");
        if (el) {
          el.style.transform =
            "rotateX(" + e.data.x + "deg) rotateY(" + e.data.y + "deg)";
        }
      }
    });
  <\/script>
  `;

  iframe().srcdoc = wrapped;
  panel.style.opacity = "1";
  panel.style.pointerEvents = "auto";
}

async function paste() {
  const text = await navigator.clipboard.readText();
  codeEl.value = text;
  run();
}

function clearAll() {
  codeEl.value = "";
  iframe().srcdoc = "";
  panel.style.opacity = "0";
  panel.style.pointerEvents = "none";
  rotX.value = 0;
  rotY.value = 0;
}

function kill() {
  const old = iframe();
  const fresh = document.createElement("iframe");
  fresh.id = "pv";
  fresh.setAttribute("sandbox","allow-scripts allow-same-origin");
  fresh.setAttribute("scrolling","yes");
  fresh.style.width="100%";
  fresh.style.height="100%";
  fresh.style.border="none";
  fresh.style.background="#fff";
  old.replaceWith(fresh);
}

/* Rotation now targets iframe content */
function updateRotation() {
  iframe().contentWindow?.postMessage({
    type: "rotate",
    x: rotX.value,
    y: rotY.value
  }, "*");
}

rotX.addEventListener("input", updateRotation);
rotY.addEventListener("input", updateRotation);

/* Background Control */
function updateBG() {
  document.documentElement.style
    .setProperty("--lab-bg", bgInput.value);
}

bgInput.addEventListener("input", updateBG);
updateBG();

/* Buttons */
document.getElementById("paste").onclick =
  () => paste().catch(()=>alert("Paste blocked"));

document.getElementById("run").onclick = run;
document.getElementById("clear").onclick = clearAll;
document.getElementById("kill").onclick = kill;
</script>

</body>
</html>
