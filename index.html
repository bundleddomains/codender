<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Preview Lab</title>

<style>
html, body {
  margin:0;
  height:100%;
  background:#0f1115;
  display:flex;
  flex-direction:column;
  font-family:system-ui, sans-serif;
}

/* TOP CONTROL BAR */
#bar {
  height:54px;
  display:flex;
  gap:10px;
  align-items:center;
  padding:8px 12px;
  background:#161a20;
  border-bottom:1px solid #222;
  box-sizing:border-box;
}

button {
  background:#1f242b;
  color:#fff;
  border:1px solid #333;
  padding:8px 12px;
  cursor:pointer;
}

label {
  color:#aaa;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:6px;
}

input[type=range] {
  width:120px;
}

/* MAIN AREA */
#wrap {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* 3D SCENE */
.scene {
  width:900px;
  height:650px;
  perspective:1400px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 3D VIEWER BOX */
.viewer {
  width:80%;
  height:80%;
  transform-style: preserve-3d;
  transform: rotateX(10deg) rotateY(20deg);
  transition: transform 0.1s ease;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}

/* Preview box styling */
.viewer iframe {
  width:100%;
  height:100%;
  border:1px solid #333;
  background:#ececec;
  border-radius:8px;
}

/* Hidden paste storage */
textarea {
  position:absolute;
  left:-9999px;
}
</style>
</head>
<body>

<div id="bar">
  <button id="paste">Paste</button>
  <button id="run">Run</button>
  <button id="clear">Clear</button>
  <button id="kill">Kill</button>

  <label>X
    <input type="range" id="rotX" min="-60" max="60" value="10">
  </label>

  <label>Y
    <input type="range" id="rotY" min="-180" max="180" value="20">
  </label>
</div>

<div id="wrap">
  <div class="scene">
    <div class="viewer" id="viewer">
      <iframe id="pv"
        sandbox="allow-scripts allow-same-origin"
        scrolling="yes">
      </iframe>
    </div>
  </div>
</div>

<textarea id="code"></textarea>

<script>
const codeEl = document.getElementById("code");
const viewer = document.getElementById("viewer");
const rotX = document.getElementById("rotX");
const rotY = document.getElementById("rotY");

function iframe() { return document.getElementById("pv"); }

/* CSP injected into every preview */
const CSP = `
<meta http-equiv="Content-Security-Policy"
content="default-src 'none'; img-src https: data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
`;

function run() {
  iframe().srcdoc = CSP + codeEl.value;
}

async function paste() {
  const text = await navigator.clipboard.readText();
  codeEl.value = text;
  run();
}

function clearAll() {
  codeEl.value = "";
  iframe().srcdoc = "";
}

function kill() {
  const old = iframe();
  const fresh = document.createElement("iframe");
  fresh.id = "pv";
  fresh.setAttribute("sandbox","allow-scripts allow-same-origin");
  fresh.setAttribute("scrolling","yes");
  fresh.style.width="100%";
  fresh.style.height="100%";
  fresh.style.border="1px solid #333";
  fresh.style.background="#ececec";
  old.replaceWith(fresh);
}

/* 3D rotation control */
function updateRotation() {
  viewer.style.transform =
    `rotateX(${rotX.value}deg) rotateY(${rotY.value}deg)`;
}

rotX.addEventListener("input", updateRotation);
rotY.addEventListener("input", updateRotation);
updateRotation();

document.getElementById("paste").onclick = () => paste().catch(()=>alert("Paste blocked"));
document.getElementById("run").onclick = run;
document.getElementById("clear").onclick = clearAll;
document.getElementById("kill").onclick = kill;
</script>

</body>
</html>
