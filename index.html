<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Minimal Render</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    display: flex;
    flex-direction: column;
  }

  #controls {
    height: 5%;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: #1a1a1a;
    box-sizing: border-box;
  }

  button {
    background: #222;
    color: #fff;
    border: 1px solid #333;
    padding: 8px 12px;
    cursor: pointer;
  }
  button:hover { background: #2c2c2c; }

  #status {
    color: #aaa;
    font-size: 12px;
    margin-left: auto;
    user-select: none;
  }

  #preview {
    height: 95%;
    width: 100%;
    border: 1px solid #333;
    background: #ececec; /* only visible before srcdoc loads */
  }

  textarea { position: absolute; left: -9999px; }
</style>
</head>
<body>

<div id="controls">
  <button id="pasteBtn">Paste</button>
  <button id="runBtn">Run</button>
  <button id="clearBtn">Clear</button>
  <div id="status">Empty</div>
</div>

<iframe id="preview" sandbox="allow-scripts"></iframe>
<textarea id="code"></textarea>

<script>
const codeEl = document.getElementById("code");
const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");

function setStatus(msg) {
  statusEl.textContent = msg;
}

function wrapWithGreyDefaults(userCode) {
  // If user pasted a full HTML doc, we inject a default style into <head>.
  // Otherwise we wrap it as body content.
  const greyStyle = `
<style>
  html, body { background: #ececec !important; margin: 0; }
</style>`.trim();

  const s = String(userCode || "");

  const hasHtmlTag = /<html[\s>]/i.test(s);
  const hasHeadTag = /<head[\s>]/i.test(s);

  if (hasHtmlTag) {
    if (hasHeadTag) {
      // inject right after <head ...>
      return s.replace(/<head([\s>])/i, `<head$1${greyStyle}\n`);
    }
    // no <head> present, inject one after <html ...>
    return s.replace(/<html([\s>])/i, `<html$1\n<head>${greyStyle}</head>\n`);
  }

  // Fragment mode
  return `<!doctype html><html><head><meta charset="utf-8">${greyStyle}</head><body>${s}</body></html>`;
}

function runCode() {
  const raw = codeEl.value;
  preview.srcdoc = wrapWithGreyDefaults(raw);
  setStatus(raw.trim() ? `Rendered (${raw.length} chars)` : "Empty");
}

async function pasteCode() {
  try {
    const text = await navigator.clipboard.readText();
    codeEl.value = text;
    setStatus(`Pasted (${text.length} chars)`);
    runCode(); // AUTO-RUN so you immediately see it
  } catch (e) {
    setStatus("Paste blocked");
    alert("Clipboard access denied by browser.");
  }
}

function clearCode() {
  codeEl.value = "";
  preview.srcdoc = wrapWithGreyDefaults("");
  setStatus("Cleared");
}

document.getElementById("pasteBtn").addEventListener("click", pasteCode);
document.getElementById("runBtn").addEventListener("click", runCode);
document.getElementById("clearBtn").addEventListener("click", clearCode);

// Start with a grey blank doc loaded
preview.srcdoc = wrapWithGreyDefaults("");
</script>

</body>
</html>
