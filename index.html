<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Preview Lab</title>

<style>
:root { --lab-bg:#0e1116; }

html, body{
  margin:0;
  height:100%;
  background:var(--lab-bg);
  display:flex;
  flex-direction:column;
  font-family:system-ui, sans-serif;
}

/* ───────── TOP BAR ───────── */
#bar{
  height:56px;
  display:flex;
  gap:10px;
  align-items:center;
  padding:8px 14px;
  background:#151922;
  border-bottom:1px solid #222;
  box-sizing:border-box;
}

button{
  background:#1f2630;
  color:#fff;
  border:1px solid #2d3642;
  padding:8px 14px;
  cursor:pointer;
}

label{
  color:#aaa;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:6px;
}

input[type=range]{ width:120px; }

/* ───────── MAIN AREA ───────── */
#wrap{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.scene{
  width:900px;
  height:650px;
  perspective:1400px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.viewer{
  width:80%;
  height:80%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Panel rotates entire iframe */
.panel{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
  transform-style:preserve-3d;
  transform-origin:center center;
  will-change:transform;
}

.panel iframe{
  border:none;
  background:transparent;
  width:100%;
  height:100%;
}

textarea{ position:absolute; left:-9999px; }
</style>
</head>
<body>

<div id="bar">
  <button id="paste">Paste</button>
  <button id="run">Run</button>
  <button id="clear">Clear</button>
  <button id="kill">Kill</button>

  <label>X <input type="range" id="rotX" min="-60" max="60" value="0"></label>
  <label>Y <input type="range" id="rotY" min="-180" max="180" value="0"></label>
</div>

<div id="wrap">
  <div class="scene">
    <div class="viewer">
      <div class="panel" id="panel">
        <iframe id="pv"
          sandbox="allow-scripts allow-same-origin"
          scrolling="yes"></iframe>
      </div>
    </div>
  </div>
</div>

<textarea id="code"></textarea>

<script>
const codeEl  = document.getElementById("code");
const panel   = document.getElementById("panel");
const rotX    = document.getElementById("rotX");
const rotY    = document.getElementById("rotY");

function iframe(){ return document.getElementById("pv"); }

/* Security layer (best effort in srcdoc) */
const CSP = `
<meta http-equiv="Content-Security-Policy"
content="
  default-src 'none';
  base-uri 'none';
  form-action 'none';
  frame-ancestors 'none';
  object-src 'none';
  connect-src 'none';
  media-src 'none';
  font-src data:;
  img-src data: https:;
  style-src 'unsafe-inline';
  script-src 'unsafe-inline';
">
<meta name="referrer" content="no-referrer">
`;

function isFullDoc(s){
  return /<!doctype\s+html|<html[\s>]/i.test(s);
}

function injectCSP(raw){
  if(/Content-Security-Policy/i.test(raw)) return raw;

  if(/<head[^>]*>/i.test(raw)){
    return raw.replace(/<head[^>]*>/i, m => m + "\n" + CSP + "\n");
  }
  return CSP + raw;
}

function run(){
  const raw = (codeEl.value || "").trim();
  if(!raw){
    iframe().srcdoc="";
    panel.style.opacity="0";
    panel.style.pointerEvents="none";
    return;
  }

  if(isFullDoc(raw)){
    iframe().srcdoc = injectCSP(raw);
  } else {
    iframe().srcdoc = CSP + raw;
  }

  panel.style.opacity="1";
  panel.style.pointerEvents="auto";
}

async function paste(){
  const text = await navigator.clipboard.readText();
  codeEl.value = text;
  run();
}

function clearAll(){
  codeEl.value="";
  iframe().srcdoc="";
  panel.style.opacity="0";
  panel.style.pointerEvents="none";
  panel.style.transform="rotateX(0deg) rotateY(0deg)";
  rotX.value=0;
  rotY.value=0;
}

function kill(){
  const old = iframe();
  const fresh = document.createElement("iframe");
  fresh.id="pv";
  fresh.setAttribute("sandbox","allow-scripts allow-same-origin");
  fresh.setAttribute("scrolling","yes");
  fresh.style.width="100%";
  fresh.style.height="100%";
  fresh.style.border="none";
  fresh.style.background="transparent";
  old.replaceWith(fresh);
}

function updateRotation(){
  panel.style.transform =
    `rotateX(${rotX.value}deg) rotateY(${rotY.value}deg)`;
}

rotX.addEventListener("input", updateRotation);
rotY.addEventListener("input", updateRotation);

document.getElementById("paste").onclick =
  () => paste().catch(()=>alert("Paste blocked"));

document.getElementById("run").onclick = run;
document.getElementById("clear").onclick = clearAll;
document.getElementById("kill").onclick = kill;
</script>

</body>
</html>
