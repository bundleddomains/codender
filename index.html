<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Centered True Render</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
    font-family: monospace;
    display: flex;
    flex-direction: column;
  }

  #controls {
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: #1a1a1a;
    box-sizing: border-box;
  }

  button {
    background: #222;
    color: #fff;
    border: 1px solid #333;
    padding: 8px 12px;
    cursor: pointer;
  }
  button:hover { background: #2c2c2c; }

  #status {
    color: #aaa;
    font-size: 12px;
    margin-left: auto;
  }

  #preview {
    flex: 1;
    width: 100%;
    border: 1px solid #333;
    background: #ececec;
    display: block;
  }

  textarea { position: absolute; left: -9999px; }
</style>
</head>
<body>

<div id="controls">
  <button id="pasteBtn">Paste</button>
  <button id="runBtn">Run</button>
  <button id="clearBtn">Clear</button>
  <div id="status">Empty</div>
</div>

<iframe id="preview" sandbox="allow-scripts" scrolling="yes"></iframe>
<textarea id="code"></textarea>

<script>
const codeEl = document.getElementById("code");
const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");

function setStatus(msg) { statusEl.textContent = msg; }

/* 
  This wrapper:
  - centers content using absolute positioning
  - DOES NOT scale
  - DOES NOT constrain width
  - preserves true intrinsic size
*/
function previewShell(innerHtml) {
  return `<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    background: #ececec;
    overflow: auto;
  }

  #__center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>
  <div id="__center">
    ${innerHtml}
  </div>
</body>
</html>`;
}

function wrapUserCode(userCode) {
  const raw = String(userCode || "");
  const hasHtml = /<html[\s>]/i.test(raw);

  // If full HTML document pasted, render as-is (no size modification)
  if (hasHtml) return raw;

  // Otherwise treat as fragment and center it
  return previewShell(raw);
}

function runCode() {
  const raw = codeEl.value;
  preview.srcdoc = wrapUserCode(raw);
  setStatus(raw.trim() ? `Rendered (${raw.length} chars)` : "Empty");
}

async function pasteCode() {
  try {
    const text = await navigator.clipboard.readText();
    codeEl.value = text;
    setStatus(`Pasted (${text.length} chars)`);
    runCode();
  } catch {
    setStatus("Paste blocked");
    alert("Clipboard access denied.");
  }
}

function clearCode() {
  codeEl.value = "";
  preview.srcdoc = previewShell("");
  setStatus("Cleared");
}

document.getElementById("pasteBtn").addEventListener("click", pasteCode);
document.getElementById("runBtn").addEventListener("click", runCode);
document.getElementById("clearBtn").addEventListener("click", clearCode);

preview.srcdoc = previewShell("");
</script>

</body>
</html>
